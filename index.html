<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻雀 対戦表ジェネレーター</title>
<style>
  /* ============================================================
     CSS変数（カスタムプロパティ）で配色を一元管理。
     :root は HTML 全体（最上位）を指すセレクタで、ここで定義した
     --xxx は var(--xxx) として全スタイルから参照できる。
     色を1か所変えるだけでサイト全体の見た目を変えられるのが利点。
     このアプリは暗い背景（ダークテーマ）で統一している。
     ------------------------------------------------------------
       --bg      ページ全体の背景（一番暗い）
       --panel   パネル/カードの背景      --panel2 その内側の一段明るい面
       --line    枠線の色                 --txt    通常の文字色
       --muted   控えめな文字（ラベル等）  --accent 強調色（緑）  --accent2 そのホバー時
       --warn    注意（オレンジ）          --bad    エラー/警告（赤）
       --chip    見出し帯の背景
       --plus    プラス点の色（緑）        --minus  マイナス点の色（赤）
     ============================================================ */
  :root{
    /* ライトグリーン・テーマ（白基調＋緑アクセント）。麻雀卓のフェルトを思わせる緑をUIに効かせる配色。 */
    --bg:#edf4ee; --panel:#ffffff; --panel2:#e6f1e9; --line:#cdded3;
    --txt:#1d2b23; --muted:#5c7367; --accent:#2a9152; --accent2:#20753f;
    --warn:#c2701f; --bad:#cf4435; --chip:#dceee3; --plus:#178a45; --minus:#cf4435;
  }
  /* * は全要素セレクタ。box-sizing:border-box にすると、padding や border を
     含めた寸法が width になり、レイアウト計算が直感的になる（定番の初期化）。 */
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Meiryo",system-ui,sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.6;}
  header{padding:20px 24px;border-bottom:1px solid var(--line);background:var(--panel);}
  header h1{margin:0;font-size:20px;display:flex;align-items:center;gap:10px}
  header p{margin:6px 0 0;color:var(--muted);font-size:13px}
  .wrap{max-width:1100px;margin:0 auto;padding:20px 24px 80px}
  .panelbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px}
  .panelbox h2{margin:0 0 12px;font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.04em}
  .row{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:12px;color:var(--muted)}
  .field input,.field select{width:150px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:9px 10px;font-size:15px}
  textarea{width:100%;min-height:80px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:10px;font-size:13px;resize:vertical;font-family:inherit}
  button{cursor:pointer;border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:600;color:#fff}
  .btn-main{background:var(--accent)} .btn-main:hover{background:var(--accent2)}
  .btn-sub{background:var(--panel2);border:1px solid var(--line);color:var(--txt)}
  .btn-sub:hover{background:#d6e8db}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 18px;align-items:center}
  .hint{color:var(--muted);font-size:12px}
  .saved{color:var(--accent);font-size:12px;opacity:0;transition:opacity .3s}
  .saved.show{opacity:1}
  .stats{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 16px;min-width:118px}
  .stat .v{font-size:21px;font-weight:700}
  .stat .k{font-size:11px;color:var(--muted)}
  .stat.good .v{color:var(--accent)} .stat.warn .v{color:var(--warn)} .stat.bad .v{color:var(--bad)}
  .round{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .round h3{margin:0 0 12px;font-size:15px;color:var(--accent);display:flex;align-items:center;gap:8px}
  .round-swap{margin-left:auto;padding:6px 12px;font-size:12px;flex:0 0 auto}
  .del-round{margin-left:6px;background:transparent;border:1px solid var(--line);color:var(--muted);
    width:30px;height:30px;padding:0;border-radius:6px;font-size:16px;line-height:1;font-weight:700;flex:0 0 auto}
  .del-round:hover{background:var(--bad);color:#fff;border-color:var(--bad)}
  .swap-hint{font-size:12px;color:var(--accent);margin:-4px 0 12px}
  #addRound{padding:11px 22px}
  /* 卓カードの並び。CSS Grid で「最低280px・余れば均等に伸ばす(1fr)」列を
     画面幅に応じて自動で何列にも折り返す（auto-fill）。手動の列数指定が不要。 */
  .tables{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .table-card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .table-card .th{background:var(--chip);padding:6px 10px;font-size:12px;color:var(--muted);font-weight:600;
    display:flex;justify-content:space-between;gap:8px}
  .table-card .th .sum.bad{color:var(--bad)}
  .seat{display:flex;align-items:center;gap:8px;padding:5px 10px;border-top:1px solid var(--line);font-size:14px}
  .seat:first-of-type{border-top:none}
  .wind{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;border-radius:5px;
    background:#cfe6d6;font-size:12px;color:#1f6b3f;flex:0 0 auto}
  .pname{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:40px}
  .score-input{width:78px;background:#ffffff;border:1px solid var(--line);color:var(--txt);
    border-radius:6px;padding:5px 7px;font-size:13px;text-align:right}
  .score-input:focus{outline:none;border-color:var(--accent)}
  .signbtn{flex:0 0 auto;width:30px;background:var(--panel);border:1px solid var(--line);color:var(--muted);
    border-radius:6px;padding:6px 0;font-size:14px;font-weight:700;line-height:1}
  .signbtn:hover{background:#e2efe6;color:var(--txt)}
  .swapmode .signbtn{pointer-events:none;opacity:.4}
  .pt{flex:0 0 auto;width:78px;text-align:right;font-size:13px;font-variant-numeric:tabular-nums}
  .pt .rk{color:var(--muted);font-size:11px;margin-right:4px}
  .pt.plus{color:var(--plus)} .pt.minus{color:var(--minus)}
  .byes{margin-top:12px;font-size:13px;color:var(--muted)}
  .byes b{color:#b07d1e}
  .bye-chip{display:inline-block;background:#fbf0d8;color:#9a6a12;border-radius:6px;padding:2px 8px;margin:2px 4px 2px 0;font-size:13px}
  .standings{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:18px}
  .standings h3{margin:0 0 10px;font-size:15px;color:var(--accent)}
  table.stb{border-collapse:collapse;width:100%;font-size:14px}
  table.stb th,table.stb td{border-bottom:1px solid var(--line);padding:7px 10px;text-align:left}
  table.stb th{color:var(--muted);font-size:12px;font-weight:600}
  table.stb td.num{text-align:right;font-variant-numeric:tabular-nums}
  table.stb td.pos{color:var(--accent);font-weight:700;width:40px}
  table.stb td.plus{color:var(--plus)} table.stb td.minus{color:var(--minus)}
  .matrix-wrap{overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:8px}
  table.mx{border-collapse:collapse;font-size:11px}
  table.mx th,table.mx td{border:1px solid var(--line);padding:3px 6px;text-align:center;min-width:26px;white-space:nowrap}
  table.mx th{background:var(--panel2);color:var(--muted)}
  td.c0{color:#9fb3a6} td.c1{color:var(--txt)} td.c2{background:#fbf0d8;color:#9a6a12}
  td.c3{background:#fbe3df;color:#c0392b} td.diag{background:#e6efe9}
  details{margin-top:14px}
  summary{cursor:pointer;color:var(--muted);font-size:13px;padding:6px 0}
  .err{color:var(--bad);font-size:13px;margin:6px 0}
  .note{color:var(--warn);font-size:13px;margin:0 0 12px}
  .legend{font-size:11px;color:var(--muted);margin-top:8px;display:flex;gap:14px;flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .sw{width:12px;height:12px;border-radius:3px;display:inline-block}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;align-items:center;justify-content:center;padding:20px}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px;max-width:360px;width:100%}
  .modal .msg{font-size:14px;margin-bottom:16px}
  .modal .mbtns{display:flex;gap:10px;justify-content:flex-end}
  #toast{position:fixed;left:50%;top:18px;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);
    color:var(--txt);padding:10px 16px;border-radius:8px;z-index:60;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%;text-align:center}
  #toast.show{opacity:1}
  /* ===== 大会ライブラリ（ブラウザ内保存）モーダルのスタイル ===== */
  .lib-modal{max-width:480px}
  .lib-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .lib-head strong{font-size:15px}
  .lib-x{padding:6px 12px;font-size:12px}
  .lib-save{display:flex;gap:8px;margin-bottom:14px}
  .lib-save input{flex:1;min-width:0;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px 10px;font-size:14px}
  .lib-save button{flex:0 0 auto;white-space:nowrap}
  .lib-list{max-height:52vh;overflow:auto;display:flex;flex-direction:column;gap:8px}
  .lib-item{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--panel2)}
  .lib-meta{flex:1;min-width:0}
  .lib-name{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lib-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .lib-btns{display:flex;gap:6px;flex:0 0 auto}
  .lib-btns button{padding:7px 12px;font-size:13px}
  .lib-empty{color:var(--muted);font-size:13px;padding:10px 4px;line-height:1.7}
  @media (max-width:640px){
    .lib-save{flex-wrap:wrap}
    .lib-save button{width:100%}
    .lib-btns{flex-direction:column}
  }
  details.collapse{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:14px}
  details.collapse>summary{padding:12px 16px;font-size:14px;color:var(--txt);font-weight:600;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px}
  details.collapse>summary::-webkit-details-marker{display:none}
  details.collapse>summary::before{content:"▸";color:var(--muted);display:inline-block;transition:transform .15s}
  details.collapse[open]>summary::before{transform:rotate(90deg)}
  details.collapse>summary .brief{color:var(--muted);font-weight:400;font-size:12px;margin-left:auto;text-align:right}
  details.collapse .stats{margin:0;padding:0 14px 14px}
  details.collapse #standings{padding:0 14px 14px}
  details.collapse #rounds{padding:8px 14px 6px}
  .cfg-toggle{width:100%;text-align:left;background:var(--panel);border:1px solid var(--line);color:var(--txt);
    border-radius:12px;padding:12px 16px;margin-bottom:14px;font-size:14px;font-weight:600;
    display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .cfg-toggle:hover{background:var(--panel2)}
  .cfg-toggle #cfgChevron{color:var(--muted);font-size:12px}
  .btn-sub.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .swapmode .seat{cursor:pointer}
  .swapmode .seat:hover{background:#d3e9da}
  .swapmode .score-input{pointer-events:none;opacity:.5}
  .seat.selected{background:#cdeed8;box-shadow:inset 0 0 0 2px var(--accent)}
  .swapmode .bye-chip{cursor:pointer}
  .swapmode .bye-chip:hover{box-shadow:inset 0 0 0 2px var(--accent)}
  .bye-chip.selected{background:#cdeed8;color:#1f6b3f;box-shadow:inset 0 0 0 2px var(--accent)}
  /* ===== レスポンシブ対応（スマホ向け） =====
     画面幅が640px以下のときだけ、以下のスタイルで上書きする（メディアクエリ）。
     卓カードを1列にしたり、ボタンを2列グリッドにしたりして指で操作しやすくする。 */
  @media (max-width:640px){
    header{padding:14px 16px}
    header h1{font-size:17px}
    header p{font-size:12px}
    .wrap{padding:14px 14px 60px}
    .panelbox{padding:14px 14px}
    .row{gap:12px}
    .field{flex:1 1 calc(50% - 6px)}
    .field input,.field select{width:100%}
    .field[style*="min-width"]{flex:1 1 100% !important;min-width:0 !important}
    #gen{flex:1 1 100%;width:100%}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .actions button{width:100%;padding:11px 8px;font-size:13px}
    .actions .saved,.actions .hint{grid-column:1/-1;text-align:center}
    .stats{gap:8px}
    .stat{flex:1 1 calc(50% - 4px);min-width:0;padding:10px 12px}
    .stat .v{font-size:18px}
    .tables{grid-template-columns:1fr;gap:10px}
    .seat{gap:6px;padding:7px 9px}
    .pname{font-size:13px}
    .score-input{width:84px;padding:8px 7px;font-size:15px}
    .pt{width:66px;font-size:12px}
    .standings{padding:12px}
    table.stb th,table.stb td{padding:6px 6px;font-size:13px}
    table.stb th{font-size:11px}
  }
  /* ===== 印刷時のスタイル =====
     ブラウザの印刷（PDF保存）時だけ適用される。画面用の暗い背景を白地・黒文字に戻し、
     操作用ボタンや凡例など印刷に不要な要素を display:none で隠す（インクと紙の節約）。 */
  @media print{
    body{background:#fff;color:#000}
    header,.controls,.actions,.legend,details>summary,#cfgPanel,.cfg-toggle,#roundCtrl,.del-round,.round-swap,.swap-hint,.signbtn,.modal-bg,#toast{display:none}
    .round,.table-card,.stat,.matrix-wrap,.standings{border-color:#999;background:#fff !important;color:#000 !important}
    .round h3,.standings h3{color:#000}.wind{background:#ddd;color:#000}.th{background:#eee !important;color:#000}
    .bye-chip{background:#eee;color:#000}.byes b{color:#000}
    .score-input{border:none;color:#000}.pt.plus,.pt.minus{color:#000}
    details{display:block}details[open] summary{display:none}
  }
</style>
</head>
<body>
<!-- ============================================================
     画面の構造（ここから下が実際に表示されるHTML）
     ・header        … タイトルと説明
     ・.wrap         … 本文全体の中央寄せコンテナ
        - 設定パネル（人数/試合数/名前/スコアルール）
        - #error / #note … エラーや注意書きの表示場所（JSが書き込む）
        - .actions     … 保存/読込/CSV/再生成などの操作ボタン
        - #stats #standings #rounds #matrix … JSが中身を生成して挿入する空の器
     ・#modal #toast  … 確認ダイアログ・通知（自前実装。理由は後述）
     id 付きの要素は、JS側から $("id") で掴んで中身を書き換える「差し込み口」。
     ============================================================ -->
<header>
  <h1>🀄 麻雀 対戦表ジェネレーター</h1>
  <p>抜け番を均等に回しつつ均等な組み合わせを生成。点棒を入れるとオカ・ウマ込みのスコアを自動計算します。</p>
</header>

<div class="wrap">
  <button id="cfgToggle" class="cfg-toggle">⚙ 設定（人数・試合数・スコアルール）<span id="cfgChevron">▲</span></button>
  <div id="settingsWrap">
  <div class="panelbox controls">
    <div class="row">
      <div class="field">
        <label>参加人数</label>
        <input id="numPlayers" type="number" min="4" step="1" value="14">
      </div>
      <div class="field">
        <label>1人あたりの試合数（目標）</label>
        <input id="numGames" type="number" min="1" step="1" value="6">
      </div>
      <div class="field" style="flex:1;min-width:260px">
        <label>参加者名（任意・1行1人。空欄なら自動で番号）</label>
        <textarea id="names" placeholder="例）&#10;田中&#10;佐藤&#10;鈴木&#10;…"></textarea>
      </div>
      <button class="btn-main" id="gen">対戦表を生成</button>
    </div>
  </div>

  <div class="panelbox" id="cfgPanel">
    <h2>スコア計算ルール</h2>
    <!-- 初期点・オカ・点棒は5桁未満で入力すると末尾に0を補って5桁にする（例: 250→25000, 253→25300）。
         0埋めは入力確定（フォーカスを外す/Enter）時に行い、値は常にフル桁で扱う。 -->
    <p class="note" style="margin:0 0 12px">※ 初期点・オカ・点棒は <b>5桁未満で入力すると末尾に「0」を補って5桁</b> にします（例: <b>250</b>→25000、<b>253</b>→25300）。</p>
    <div class="row">
      <div class="field">
        <label>初期点（配給原点）</label>
        <input id="setKichi" type="number" step="1000" value="25000">
      </div>
      <div class="field">
        <label>オカ（1位への上乗せ合計）</label>
        <input id="setOka" type="number" step="1000" value="20000">
      </div>
      <div class="field">
        <label>ウマ</label>
        <select id="setUma">
          <option value="5-10">5-10（+10 / +5 / −5 / −10）</option>
          <option value="10-20" selected>10-20（+20 / +10 / −10 / −20）</option>
          <option value="10-30">10-30（+30 / +10 / −10 / −30）</option>
          <option value="20-30">20-30（+30 / +20 / −20 / −30）</option>
        </select>
      </div>
      <span class="hint" id="kaeshiInfo"></span>
    </div>
  </div>
  </div>

  <!-- 中身が空の入れ物。JSがエラー文・注意文をここに流し込む -->
  <div id="error"></div>
  <div id="note"></div>

  <!-- 生成前は隠しておき（display:none）、対戦表ができたらJSが表示する -->
  <div class="actions" id="actions" style="display:none">
    <button class="btn-sub" id="libMng">📚 大会を保存・呼び出し</button>
    <button class="btn-sub" id="csv">Excel（CSV）で保存</button>
    <button class="btn-sub" id="clearScores">点数をクリア</button>
    <button class="btn-sub" id="regen">別の組み合わせで再生成</button>
    <span class="saved" id="savedMsg">✓ 自動保存しました</span>
    <span class="hint" id="seedInfo"></span>
  </div>

  <!-- <details>/<summary> はブラウザ標準の開閉パネル（アコーディオン）。
       JSなしでクリックで開閉できる。中の #stats などはJSが中身を生成する。 -->
  <details class="collapse" id="statsBox">
    <summary>詳細情報（人数・偏り・席の均等）<span class="brief" id="statsBrief"></span></summary>
    <div class="stats" id="stats"></div>
  </details>
  <details class="collapse" id="standBox">
    <summary>順位表<span class="brief" id="standBrief"></span></summary>
    <div id="standings"></div>
  </details>
  <details class="collapse" id="roundsBox" open>
    <summary>対戦表<span class="brief" id="roundsBrief"></span></summary>
    <div id="rounds"></div>
  </details>
  <div id="roundCtrl" style="display:none;text-align:center;margin:2px 0 24px">
    <button id="addRound" class="btn-sub">＋ 対戦を1つ追加</button>
  </div>
  <div id="matrix"></div>
</div>

<!-- 自前の確認ダイアログ（はい/いいえ）とトースト通知。
     標準の confirm()/alert() は一部の簡易ブラウザ(WebView)で動かないため、
     見た目を自作してJSで開閉する。普段は modal-bg が display:none で隠れている。 -->
<div class="modal-bg" id="modal"><div class="modal"><div class="msg" id="modalMsg"></div>
  <div class="mbtns"><button class="btn-sub" id="modalNo">いいえ</button><button class="btn-main" id="modalYes">はい</button></div></div></div>
<div id="toast"></div>

<!-- ブラウザ内に保存した大会の一覧（ライブラリ）。名前を付けて保存し、ここから読み込み・削除する。
     データは localStorage の LIB_KEY に配列として入る（端末のブラウザ内に残り、リロードしても消えない）。 -->
<div class="modal-bg" id="libModal"><div class="modal lib-modal">
  <div class="lib-head"><strong>📚 保存した大会</strong><button class="btn-sub lib-x" id="libClose">閉じる</button></div>
  <div class="lib-save">
    <input id="libName" type="text" placeholder="保存名（例：6月度大会）" maxlength="40">
    <button class="btn-main" id="libSaveBtn">現在の大会を保存</button>
  </div>
  <div id="libList" class="lib-list"></div>
</div></div>

<script>
/* ================================================================
   このアプリ全体の流れ（ざっくり）
   1. buildSchedule() … 「誰と誰が同卓するか」の対戦表を作る。
        ・抜け番（4で割り切れない人数のときの待機者）を均等に回す
        ・同じ相手と何度も当たらないよう「焼きなまし法」で最適化
        ・東南西北（親番）も均等になるよう席を割り当てる
   2. 画面に対戦表を描画（render）。各席に点棒の入力欄を出す。
   3. 点棒を入れると tableResult() がオカ・ウマ込みのスコアを計算し、
      順位表（standings）をリアルタイム更新する。
   4. localStorage（ブラウザ内保存）に自動保存。さらに名前を付けて複数の大会を
      ブラウザ内に保存・参照・削除できる（大会ライブラリ）。CSV出力もできる。

   データの持ち方（重要）
   ・current … 今表示している大会1件。{P:人数, R:戦数, T:卓数, rounds:[...], names:[...]} など
   ・rounds  … 各戦の配列。1戦 = {tables:[[席0の人,席1,席2,席3], ...], byes:[抜け番の人,...]}
              ※ 配列に入っているのは「プレイヤー番号(0〜P-1)」。名前は names[番号] で引く。
   ・scores  … 点棒の入力値。キー "戦_卓_席"（例 "0_1_2"）→ 文字列の点数
   ================================================================ */

/* --- 定数（プログラム実行中ずっと変わらない値） --- */
const WINDS=["東","南","西","北"];            // 席インデックス0〜3に対応する風（門風）
const RANKLBL=["1着","2着","3着","4着"];       // 着順表示用ラベル
// ウマの一覧。キーが種類、値は[1着,2着,3着,4着]の加減点(千点単位)。
// 例 "10-20" を選ぶと 1着+20 / 2着+10 / 3着-10 / 4着-20。
const UMA_TABLE={"5-10":[10,5,-5,-10],"10-20":[20,10,-10,-20],"10-30":[30,10,-10,-30],"20-30":[30,20,-20,-30]};
// PERMS = [0,1,2,3] の全並び替え（順列）24通りを先に作っておく配列。
// 席（東南西北）の割り当てを「24通り試して一番偏らないもの」を選ぶのに使う。
// 中身は再帰でその場生成（即時実行関数）。a[k]とa[i]を入れ替えながら全パターンを列挙している。
const PERMS=(function(){const r=[],a=[0,1,2,3];(function p(k){if(k===4){r.push(a.slice());return;}for(let i=k;i<4;i++){[a[k],a[i]]=[a[i],a[k]];p(k+1);[a[k],a[i]]=[a[i],a[k]];}})(0);return r;})();
const $=id=>document.getElementById(id);       // よく使う document.getElementById の短縮版
const LAST_KEY="mahjong_last_v2";              // localStorageの保存キー（最後に開いた大会）
const scoreKeyFor=id=>"mahjong_scores_"+id;    // 大会IDごとの点数を保存するキーを作る関数

/* --- 状態変数（アプリの「今の状態」を保持。letなので書き換わる） --- */
let current=null;     // 今表示中の大会。{id,P(人数),G(目標試合数),R(戦数),T(卓数),Bpr(抜け番数),names,rounds}
let scores={};        // 点棒入力。キー"戦_卓_席"→点数の文字列
let settings={kichi:25000,oka:20000,uma:"10-20"};  // スコアルール（初期点・オカ・ウマ）

// 名前欄(textarea)を読み、人数P人ぶんの名前配列を返す。
// 改行で分割→前後の空白除去(trim)→空行を除外(filter)。足りない分は "No.1" のように自動補完。
function readPlayers(P){
  const raw=$("names").value.split(/\r?\n/).map(s=>s.trim()).filter(s=>s.length);
  const names=[];
  for(let i=0;i<P;i++) names.push(raw[i]!==undefined?raw[i]:("No."+(i+1)));
  return names;
}
// 乱数生成器(Mulberry32)。引数aを「種(seed)」にすると、同じ種からは常に同じ乱数列が出る＝再現可能。
// 呼ぶたびに0以上1未満の数を返す関数を作って返す（クロージャ）。
// |0 や >>> はビット演算で32bit整数に丸める処理。Math.imulは32bit掛け算。中身の理解は必須ではない。
function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// ===== スケジュール生成（このアプリの心臓部） =====
// 引数 P:人数 R:戦数 T:1戦あたりの卓数 Bpr:1戦あたりの抜け番人数 seed:乱数の種
// 返り値 {rounds, counts, byeCount, wind}
// やりたいこと：全員がなるべく「同じ相手と当たる回数」「抜け番回数」「親番(東南西北)」
//               が均等になる対戦表を作る。完璧な解は難しいので近似的に最適化する。
function buildSchedule(P,R,T,Bpr,seed){
  const rng=mulberry(seed);                       // 種つき乱数。同じ種なら同じ表が再現される
  // 2人(a,b)の組を1つの番号に変換する関数。a<bに正規化して「a行b列」を一意なindexにする。
  // これで「ペアの対戦回数」を1次元配列countsで数えられる（counts[pairIdx(a,b)]）。
  const pairIdx=(a,b)=> a<b?a*P+b:b*P+a;
  const counts=new Int32Array(P*P);               // 各ペアが同卓した回数。Int32Arrayは高速な整数配列
  const byeCount=new Int32Array(P);               // 各プレイヤーが抜け番になった累計回数
  let prevBye=new Set();                          // 直前の戦で抜け番だった人の集合（連続を避けるため）
  // ある卓の「不均等さ(コスト)」の増減を計算。卓内の6ペアそれぞれについて、
  // すでにc回当たっているなら2c+1だけコスト増（＝既に多く当たっている人同士を避けたい）。
  // 卓を足すとき(sign>0)は +(2c+1)、抜くとき(sign<0)は -(2c+1) を合計する。
  function tableCostDelta(tbl,sign){let d=0;for(let i=0;i<4;i++)for(let j=i+1;j<4;j++){const c=counts[pairIdx(tbl[i],tbl[j])];d+=sign>0?(2*c+1):(-2*c+1);}return d;}
  // 卓の6ペアの対戦回数を実際に+1（sign=1）または-1（sign=-1）する。仮置き／取り消しに使う。
  function applyTable(tbl,sign){for(let i=0;i<4;i++)for(let j=i+1;j<4;j++) counts[pairIdx(tbl[i],tbl[j])]+=sign;}
  const rounds=[];                                // 完成した各戦をためていく配列
  // 1戦ずつ作っていく
  for(let r=0;r<R;r++){
    // --- (1) この戦の抜け番を決める ---
    let byes=[];
    if(Bpr>0){                                    // 人数が4の倍数でないときだけ抜け番が出る
      // 各人に「スコア」を付けて低い順に抜け番にする。スコアの内訳：
      //   抜け番回数*1000 … これまで抜けた回数が少ない人を最優先（一番効く）
      //   直前に抜けた?300 … 2連続の抜け番を避ける
      //   乱数*100         … 同点のときランダムに散らす（毎回同じ人を避ける）
      const scored=[];
      for(let p=0;p<P;p++) scored.push([p,byeCount[p]*1000+(prevBye.has(p)?300:0)+rng()*100]);
      scored.sort((x,y)=>x[1]-y[1]);              // スコアが小さい順に並べる
      byes=scored.slice(0,Bpr).map(x=>x[0]);      // 先頭からBpr人を抜け番に
    }
    // --- (2) 着席する人をシャッフルして、4人ずつ卓に分ける ---
    const byeSet=new Set(byes);
    const seated=[];
    for(let p=0;p<P;p++) if(!byeSet.has(p)) seated.push(p);   // 抜け番以外を着席リストへ
    // Fisher–Yatesシャッフル：末尾から、ランダムな位置と交換していく定番のシャッフル法。
    for(let i=seated.length-1;i>0;i--){const j=(rng()*(i+1))|0;[seated[i],seated[j]]=[seated[j],seated[i]];}
    const tables=[];
    for(let t=0;t<T;t++) tables.push(seated.slice(t*4,t*4+4));  // 4人ずつ切り出してT卓ぶん作る
    tables.forEach(t=>applyTable(t,1));            // いったん全卓の対戦回数を反映（仮の初期配置）

    // --- (3) 焼きなまし法(Simulated Annealing)で席を入れ替えて偏りを減らす ---
    // 「2卓から1人ずつ選んで入れ替え→偏り(コスト)が減れば採用」を大量に繰り返す。
    // コストが増える入れ替えも、最初(temp高)はある確率で受け入れる＝局所解にハマりにくい。
    // tempを少しずつ下げる(冷ます)ことで、徐々に「良くなる入れ替えだけ」採用に寄せていく。
    let temp=2.0;const iters=Math.max(2500,T*T*500);  // 卓数が多いほど試行回数を増やす
    for(let it=0;it<iters;it++){
      const tA=(rng()*T)|0,tB=(rng()*T)|0;if(tA===tB)continue;  // 別々の2卓を選ぶ
      const iA=(rng()*4)|0,iB=(rng()*4)|0;         // それぞれの卓の席を1つずつ選ぶ
      const A=tables[tA],B=tables[tB];
      // 入れ替え前のコストを記録しつつ、両卓を一旦countsから取り除く(-1)
      const b1=tableCostDelta(A,-1);applyTable(A,-1);
      const b2=tableCostDelta(B,-1);applyTable(B,-1);
      [A[iA],B[iB]]=[B[iB],A[iA]];                 // 2人を入れ替え
      // 入れ替え後のコストを測りつつ、両卓を再びcountsへ加える(+1)
      const a1=tableCostDelta(A,1);applyTable(A,1);
      const a2=tableCostDelta(B,1);applyTable(B,1);
      // 悪化した(>0)場合、確率 exp(-悪化量/temp) でだけ許可。それ以外は↓で元に戻す。
      if((a1+a2)-(b1+b2)>0 && rng()>Math.exp(-((a1+a2)-(b1+b2))/temp)){
        applyTable(A,-1);applyTable(B,-1);[A[iA],B[iB]]=[B[iB],A[iA]];applyTable(A,1);applyTable(B,1);
      }
      temp*=0.9995;if(temp<0.05)temp=0.05;         // 少しずつ冷ます（下限0.05）
    }
    rounds.push({tables,byes});                     // この戦を確定
    byes.forEach(p=>byeCount[p]++);prevBye=byeSet;  // 抜け番回数を更新し、次戦の判定用に記録
  }
  // --- (4) 席（東南西北=親番）を均等化する ---
  // wind[p*4+w] = プレイヤーpが風w(0東/1南/2西/3北)に座った回数。
  // ここまでで卓の「メンバー」は決まったが、4人の「並び順(席)」はまだ最適化していない。
  const wind=new Int32Array(P*4);
  const allTables=[];rounds.forEach(rd=>rd.tables.forEach(t=>allTables.push(t)));  // 全戦・全卓を1列に
  allTables.forEach(t=>{for(let i=0;i<4;i++)wind[t[i]*4+i]++;});                    // 現状の席をwindに集計
  // 各卓について「この卓の4人の並べ替え24通り(PERMS)」を試し、全体の風が一番偏らない並びを選ぶ。
  // 1卓直すと他の集計も変わるので、5周(pass)繰り返して全体を少しずつ均す。
  for(let pass=0;pass<5;pass++){
    for(const t of allTables){
      for(let i=0;i<4;i++)wind[t[i]*4+i]--;        // この卓の寄与をいったん引く（自分以外との比較のため）
      let bp=null,bc=Infinity;                     // bp:最良の並べ替え, bc:そのときの合計回数(小さいほど良い)
      // 24通りの並べ替えを試し、4人それぞれが新しい席に座ったときの「既存回数の合計」が最小のものを探す
      for(const pm of PERMS){let c=0;for(let i=0;i<4;i++)c+=wind[t[i]*4+pm[i]];if(c<bc){bc=c;bp=pm;}}
      const no=new Array(4);for(let i=0;i<4;i++)no[bp[i]]=t[i];  // 最良の並びで席を組み直す
      for(let i=0;i<4;i++){t[i]=no[i];wind[t[i]*4+i]++;}        // 卓の並びを更新し、windに足し戻す
    }
  }
  return {rounds,counts,byeCount,wind};            // 対戦表と、各種の統計データを返す
}

// 既存の rounds から統計を「数え直す」関数。
// buildScheduleが返す統計は生成直後のもの。手動の席入れ替えや対戦の追加/削除の後は
// 実データとズレるので、表示前に毎回ここで rounds を走査して正確な数値を作る。
// 返り値：counts(ペア対戦回数), wind(席回数), byeCount(抜け番回数),
//         meet(対戦回数の最小/最大/平均/分散), ws(席の偏り幅), gmin/gmax(1人の試合数の範囲), R(戦数)

function deriveStats(rounds,P){
  const counts=new Int32Array(P*P),wind=new Int32Array(P*4),byeCount=new Int32Array(P);
  const R=rounds.length;
  // 全戦・全卓を走査して、ペア対戦回数・席回数・抜け番回数を数える
  rounds.forEach(rd=>{
    rd.tables.forEach(t=>{for(let i=0;i<4;i++){wind[t[i]*4+i]++;for(let j=i+1;j<4;j++){const a=t[i],b=t[j];counts[(a<b?a*P+b:b*P+a)]++;}}});
    rd.byes.forEach(p=>byeCount[p]++);
  });
  // 全ペア(a,b)について対戦回数の 最小mn / 最大mx / 合計sum / 個数n / 二乗和sq を集計
  let mn=Infinity,mx=0,sum=0,n=0,sq=0;
  for(let a=0;a<P;a++)for(let b=a+1;b<P;b++){const c=counts[a*P+b];mn=Math.min(mn,c);mx=Math.max(mx,c);sum+=c;n++;sq+=c*c;}
  const avg=sum/n;                                 // 平均対戦回数
  // ws = 席の偏り。各人の「最も多い風 − 最も少ない風」の最大値。0なら全員が東南西北を均等に経験。
  let ws=0;for(let p=0;p<P;p++){let lo=Infinity,hi=0;for(let w=0;w<4;w++){lo=Math.min(lo,wind[p*4+w]);hi=Math.max(hi,wind[p*4+w]);}ws=Math.max(ws,hi-lo);}
  // 1人あたりの試合数 = 戦数R − 抜け番回数。その最小gmin・最大gmaxを求める（差が1以内なら良好）。
  let gmin=Infinity,gmax=0;for(let p=0;p<P;p++){const g=R-byeCount[p];gmin=Math.min(gmin,g);gmax=Math.max(gmax,g);}
  // variance（分散）= 二乗の平均 − 平均の二乗。対戦回数のばらつきの指標。
  return {counts,wind,byeCount,meet:{min:mn,max:mx,avg,variance:sq/n-avg*avg},ws,gmin,gmax,R};
}

// ===== スコア計算（オカ・ウマ） =====
// 1つの卓(r戦t卓)の結果を計算する。
// 麻雀の精算ルールの考え方：
//   素点    = 持ち点 − 返し点（返し点が±0の基準。配給原点+オカ/4）
//   返し点  = 初期点 + オカ/4（例:25000+20000/4=30000）。全員から30000ぶん集めてオカを作るイメージ
//   オカ    = その集めた分を1着が総取り（トップ賞）
//   ウマ    = 着順による固定の加減点（1着+20/2着+10/3着-10/4着-20 など）
//   五捨六入= 素点を千点単位に丸める方式。500点以下は切り捨て、600点以上は切り上げ
function tableResult(r,t,tbl){
  // --- 4席ぶんの点棒を読み取る ---
  const pts=[];let allEntered=true,sum=0;
  for(let i=0;i<4;i++){
    const v=scores[`${r}_${t}_${i}`];
    // 未入力・空・数字でない → その席はnull、allEntered(全員入力済み)をfalseに
    if(v==null||v===""||isNaN(parseFloat(v))){pts.push(null);allEntered=false;}
    else{const num=parseFloat(v);pts.push(num);sum+=num;}    // sumは点棒の合計（検算用）
  }
  const target=settings.kichi*4;                  // 本来あるべき点棒合計（初期点×4人）
  // 4人そろっていない卓は計算せず、入力済み人数だけ返す（途中経過の表示用）
  if(!allEntered) return {allEntered:false,sum,target,filled:pts.filter(x=>x!=null).length};
  const kaeshi=settings.kichi+settings.oka/4;      // 返し点（この点ちょうどなら素点±0）
  const uma=UMA_TABLE[settings.uma]||[0,0,0,0];    // 選択中のウマ配列[1着,2着,3着,4着]
  // 着順を決める。点棒の多い順に並べ、同点なら席順（添字の小さい＝東に近い方）を上位に。
  const order=[0,1,2,3].sort((a,b)=> pts[b]-pts[a] || a-b);
  const rank=[];order.forEach((seat,r2)=>rank[seat]=r2);  // rank[席] = 0(1着)〜3(4着) に変換
  // --- 各席の最終スコア(千点単位pt)を計算 ---
  const sc=[];
  for(let i=0;i<4;i++){
    const soten=gosha(pts[i]-kaeshi);              // 素点(=持ち点−返し点)を五捨六入してptへ
    sc[i]=soten + uma[rank[i]] + (rank[i]===0?settings.oka/1000:0);  // 素点＋ウマ＋(1着ならオカ)
  }
  // 五捨六入の丸めで卓の合計が±1ptずれることがある。点棒合計が正しい卓に限り、
  // そのズレを1着のスコアで吸収して卓合計をきっちり0ptにそろえる（ゼロサムを保証）。
  if(Math.abs(sum-target)<0.5){
    const scSum=sc[0]+sc[1]+sc[2]+sc[3];
    if(scSum!==0) sc[order[0]]-=scSum;             // 合計が+1なら1着を−1、−1なら1着を+1
  }
  return {allEntered:true,sum,target,pts,rank,sc};
}

// 入力欄を読んで対戦表を作る入口。seedは乱数の種（再生成のたびに変える）。
function generate(seed){
  $("error").innerHTML="";$("note").innerHTML="";        // 前回のエラー/注意表示を消す
  const P=parseInt($("numPlayers").value,10);            // 参加人数
  const G=parseInt($("numGames").value,10);              // 1人あたりの目標試合数
  // --- 入力チェック（不正なら赤いエラーを出して中断） ---
  if(!P||P<4){$("error").innerHTML='<div class="err">参加人数は4人以上で入力してください。</div>';return;}
  if(!G||G<1){$("error").innerHTML='<div class="err">1人あたりの試合数は1以上で入力してください。</div>';return;}
  if(P>200||G>60){$("error").innerHTML='<div class="err">規模が大きすぎます（人数200・試合数60まで）。</div>';return;}
  // T:卓数(=人数÷4の整数部) Bpr:1戦あたりの抜け番(=人数を4で割った余り) S:1戦で打てる人数
  const T=Math.floor(P/4),Bpr=P%4,S=4*T;
  // 必要な戦数R。目標試合数G×人数P＝のべ出場数を、1戦の出場枠Sで割って四捨五入。最低1戦。
  const R=Math.max(1,Math.round(G*P/S));
  if(R>120){$("error").innerHTML='<div class="err">ラウンド数が多すぎます。試合数を減らしてください。</div>';return;}
  const names=readPlayers(P);
  // --- 複数回作って一番良い対戦表を採用する ---
  // buildScheduleは乱数頼りなので、種を変えて数回作り、評価キーが最小のものを選ぶ。
  let best=null,bestKey=null;
  const tries=(P*R<=600)?6:3;                            // 小規模は6回、大規模は3回（時間との兼ね合い）
  for(let k=0;k<tries;k++){
    const res=buildSchedule(P,R,T,Bpr,(seed*1000+k*97+13)>>>0);  // 毎回ちがう種で生成
    const st=deriveStats(res.rounds,P);
    // 評価キー＝[最大対戦回数, 分散, 席偏り, −最小対戦回数]。先頭から優先で小さいほど良い。
    // （まず最大対戦回数を抑え、次にばらつき…という優先順位）
    const key=[st.meet.max,st.meet.variance,st.ws,-st.meet.min];
    if(!best||lt(key,bestKey)){best=res;bestKey=key;}    // よりキーの小さい候補を採用
  }
  // 採用した対戦表を current にセット。idは「時刻_乱数」で一意に。点数はまっさらに。
  current={id:Date.now()+"_"+((Math.random()*1e6)|0),P,G,R,T,Bpr,names,rounds:best.rounds};
  scores={};
  saveLast();render();return true;                       // 保存して画面描画
}
// 配列同士の「辞書式」大小比較。aがbより小さければtrue（前の要素から順に見る）。
function lt(a,b){for(let i=0;i<a.length;i++){if(a[i]<b[i])return true;if(a[i]>b[i])return false;}return false;}

// ===== 保存・復元（localStorage / ファイル） =====
// localStorageはブラウザ内に文字列で保存できる領域。リロードしても消えない。
// オブジェクトはそのまま入らないので JSON.stringify で文字列化して保存する。

// 大会本体（対戦表・名前・設定）と点数を保存。次回開いたとき復元される。
function saveLast(){
  try{
    localStorage.setItem(LAST_KEY,JSON.stringify({id:current.id,P:current.P,G:current.G,names:current.names,rounds:current.rounds,settings}));
    localStorage.setItem(scoreKeyFor(current.id),JSON.stringify(scores));
  }catch(e){}                                     // 容量超過やプライベートモード等で失敗しても落ちないよう握りつぶす
}
// 点数だけ保存。flash=trueなら「✓自動保存しました」を一瞬光らせる（点棒入力のたびに呼ばれる）。
function saveScores(flash){
  try{localStorage.setItem(scoreKeyFor(current.id),JSON.stringify(scores));}catch(e){}
  // setTimeoutで1.2秒後にメッセージを消す。前のタイマーはclearTimeoutで打ち消す（連打対策）。
  if(flash){const m=$("savedMsg");m.classList.add("show");clearTimeout(saveScores._t);saveScores._t=setTimeout(()=>m.classList.remove("show"),1200);}
}
// settingsの値を設定欄の入力ボックスに反映する（復元時などに使う）。値はフル桁(25000等)。
function applySettingsToInputs(){$("setKichi").value=settings.kichi;$("setOka").value=settings.oka;$("setUma").value=settings.uma;updateKaeshiInfo();}
// 「返し点 = ○○点」の案内表示を更新。toLocaleString()で3桁区切り（30,000）にする。
function updateKaeshiInfo(){const k=settings.kichi+settings.oka/4;$("kaeshiInfo").textContent=`返し点 = ${k.toLocaleString()}点（この点が ±0）`;}
// ページを開いたときに前回の大会を復元する。あれば true を返す。
function restore(){
  try{
    const raw=localStorage.getItem(LAST_KEY);if(!raw)return false;   // 保存が無ければ復元しない
    const d=JSON.parse(raw);if(!d||!d.rounds)return false;            // 壊れていたら諦める
    loadState(d, JSON.parse(localStorage.getItem(scoreKeyFor(d.id))||"{}"));  // 点数も読み込んで復元
    return true;
  }catch(e){return false;}                        // JSON破損などは false（→新規生成にフォールバック）
}
// 保存データ d と点数 sc から current を組み立て、入力欄にも反映して描画する。
// 復元・ファイル読み込みの共通処理。Pや卓数は保存し直さず names の長さから計算し直す。
function loadState(d, sc){
  const P=d.names.length;const T=Math.floor(P/4),Bpr=P%4;
  current={id:d.id,P,G:d.G,R:d.rounds.length,T,Bpr,names:d.names,rounds:d.rounds};
  scores=sc||{};
  // 設定があれば取り込む。+で数値化し、不正値は || で既定値に。ウマは表に無いキーなら"10-20"に。
  if(d.settings){settings={kichi:+d.settings.kichi||25000,oka:+d.settings.oka||0,uma:UMA_TABLE[d.settings.uma]?d.settings.uma:"10-20"};}
  $("numPlayers").value=P;$("numGames").value=d.G;$("names").value=d.names.join("\n");  // 入力欄にも反映
  applySettingsToInputs();
  saveLast();render();
}

// 画面全体を描き直す関数。currentの内容からHTML文字列を組み立て、各容器に流し込む。
// JSの「テンプレートリテラル」（`...${変数}...`）でHTMLを文字列として作り、innerHTMLで挿入する。
function render(){
  const {P,R,T,Bpr,names,rounds}=current;          // 分割代入：currentから必要な値を取り出す
  const st=deriveStats(rounds,P);                  // 最新の統計を計算（手動編集後でも正確）
  // --- 上部の統計カード（人数・偏りなど）を組み立て ---
  const spread=st.meet.max-st.meet.min;            // 対戦回数のばらつき幅
  const mcls=spread<=1?"good":spread===2?"warn":"bad";  // 幅に応じて色クラス（緑/橙/赤）を選ぶ三項演算子
  const wcls=st.ws<=1?"good":st.ws===2?"warn":"bad";    // 席偏りの色クラス
  const gtext=(st.gmin===st.gmax)?`${st.gmin}`:`${st.gmin}–${st.gmax}`;  // 試合数（全員同じなら1値、違えば範囲表示）
  const gcls=(st.gmin===st.gmax)?"good":"warn";
  $("stats").innerHTML=`
    <div class="stat"><div class="v">${P}</div><div class="k">参加人数</div></div>
    <div class="stat"><div class="v">${R}</div><div class="k">ラウンド数</div></div>
    <div class="stat"><div class="v">${T}</div><div class="k">卓数 / ラウンド</div></div>
    <div class="stat ${Bpr?'warn':'good'}"><div class="v">${Bpr||'なし'}</div><div class="k">抜け番 / ラウンド</div></div>
    <div class="stat ${gcls}"><div class="v">${gtext}</div><div class="k">1人の試合数</div></div>
    <div class="stat ${mcls}"><div class="v">${st.meet.min}–${st.meet.max}</div><div class="k">同じ相手と当たる回数</div></div>
    <div class="stat ${wcls}"><div class="v">${st.ws===0?'完全均等':'差 '+st.ws}</div><div class="k">席（親番）の偏り</div></div>`;
  // --- 注意書き（条件に当てはまるものだけ表示） ---
  let notes=[];
  if(st.gmin!==st.gmax) notes.push(`参加人数が4の倍数でないため試合数を完全に揃えられません（${st.gmin}〜${st.gmax}試合・差は1まで）。`);
  if(Bpr>0) notes.push(`各ラウンド ${Bpr} 人が抜け番（待機）。抜け番は全員に均等に回しています。`);
  $("note").innerHTML=notes.length?`<div class="note">※ ${notes.join(' ')}</div>`:"";   // 無ければ空
  $("statsBrief").textContent=`${P}人・${R}戦・抜け番 ${Bpr||'なし'}・対戦差 ${spread}・親番差 ${st.ws}`;  // 折りたたみ見出しの要約

  // --- 対戦表（各戦の卓と席）のHTMLを組み立て ---
  let h="";                                        // hにHTML文字列を継ぎ足していく
  rounds.forEach((rd,r)=>{                          // rd=その戦のデータ, r=戦番号(0始まり)
    const sm=(r===swapRound);                       // この戦が今「席入れ替えモード」かどうか
    // 戦の見出し。入れ替えボタンと削除(×)ボタンを置く。data-r で戦番号を要素に埋め込み、
    // 後でクリックされたとき e.target.dataset.r から「どの戦か」を取り出せるようにしている。
    h+=`<div class="round${sm?' swapmode':''}"><h3>第 ${r+1} 戦`+
       `<button class="round-swap btn-sub${sm?' active':''}" data-r="${r}">${sm?'✓ 入れ替え中':'🔀 入れ替え'}</button>`+
       `<button class="del-round" data-r="${r}" title="この戦を削除">×</button></h3>`+
       (sm?`<div class="swap-hint">入れ替えたい2つ（席・抜け番）をタップ。もう一度ボタンで終了。</div>`:``)+
       `<div class="tables">`;
    // 卓ごとのカード。id="sum_戦_卓" の所に後で合計を、各席に点棒入力欄を出す。
    rd.tables.forEach((tbl,t)=>{
      h+=`<div class="table-card"><div class="th"><span>卓 ${t+1}</span><span class="sum" id="sum_${r}_${t}"></span></div>`;
      // 4席ぶん。p=プレイヤー番号, i=席(0東〜3北)。keyは点数の保存キー。
      tbl.forEach((p,i)=>{
        // scoresはフル桁で保持。そのまま初期表示する。
        const key=`${r}_${t}_${i}`;const val=scores[key]!=null?esc(scores[key]):"";
        // 席1行：風ラベル＋名前＋符号反転ボタン(±)＋点棒入力＋計算結果(pt)の表示枠。
        // esc()はHTMLエスケープ。名前に < や & が入っても表示崩れ・XSSを防ぐ。
        // 点棒は5桁未満で入力すると確定時に末尾0埋めで5桁になる（changeイベントで処理）。
        h+=`<div class="seat" data-r="${r}" data-t="${t}" data-s="${i}"><span class="wind">${WINDS[i]}</span><span class="pname">${esc(names[p])}</span>`+
           `<button class="signbtn" type="button" title="プラス・マイナス切替">±</button>`+
           `<input class="score-input" type="number" inputmode="numeric" step="100" placeholder="点棒" title="5桁未満で入力すると末尾に0を補って5桁にします（例:320→32000）" data-key="${key}" value="${val}">`+
           `<span class="pt" id="pt_${key}"></span></div>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;
    // 抜け番がいればチップで表示。data-bi は byes配列の何番目か（入れ替え用）。
    if(rd.byes.length) h+=`<div class="byes"><b>抜け番：</b>`+rd.byes.map((p,bi)=>`<span class="bye-chip" data-r="${r}" data-bi="${bi}">${esc(names[p])}</span>`).join('')+`</div>`;
    h+=`</div>`;
  });
  $("rounds").innerHTML=h;                          // 組み立てたHTMLを一括で画面に反映
  $("roundsBrief").textContent=`全 ${rounds.length} 戦`;

  // --- 対戦回数マトリクス（縦×横にプレイヤーを並べ、交差マスに対戦回数を表示） ---
  let m=`<details><summary>▸ 対戦回数マトリクス（誰と何回当たるか）を表示</summary><div class="matrix-wrap"><table class="mx"><tr><th></th>`;
  for(let b=0;b<P;b++) m+=`<th>${esc(short(names[b]))}</th>`;   // 1行目：横方向の名前見出し（short=4文字に短縮）
  m+=`</tr>`;
  for(let a=0;a<P;a++){
    m+=`<tr><th>${esc(short(names[a]))}</th>`;                  // 各行先頭：縦方向の名前見出し
    for(let b=0;b<P;b++){
      if(a===b){m+=`<td class="diag">–</td>`;continue;}         // 自分自身の対角線は「–」
      const c=st.counts[(a<b?a*P+b:b*P+a)];                     // aとbの対戦回数を取得
      m+=`<td class="${c>=3?'c3':c===2?'c2':c===1?'c1':'c0'}">${c}</td>`;  // 回数に応じて色クラスを変える
    }
    m+=`</tr>`;
  }
  m+=`</table><div class="legend">
      <span><span class="sw" style="background:#aebfb4"></span>0回</span>
      <span><span class="sw" style="background:#2a9152"></span>1回</span>
      <span><span class="sw" style="background:#d6a43a"></span>2回</span>
      <span><span class="sw" style="background:#cf4435"></span>3回以上</span>
    </div></div></details>`;
  $("matrix").innerHTML=m;

  // 生成後に隠れていた操作ボタン群と「対戦を追加」ボタンを表示する
  $("actions").style.display="flex";
  $("roundCtrl").style.display="block";
  $("seedInfo").textContent=`各人 ${gtext} 試合 / ペア対戦 ${st.meet.min}〜${st.meet.max} 回 / 親番偏り ${st.ws}`;
  updateTotals();                                  // 点数の合計・順位表を計算して表示
}

// 全卓のスコアを計算して、プレイヤーごとの合計などを集計する。
//   total     … 各人の合計スコア
//   scheduled … 各人の予定試合数（卓に座った数）
//   completed … 各人の消化試合数（4人そろってスコア確定した卓の数）
//   tinfo     … 卓ごとの計算結果（"戦_卓"→{res,tbl}）。後で各席の表示に使う。
function computeAll(){
  const {P,names,rounds}=current;
  const total=new Array(P).fill(0),scheduled=new Array(P).fill(0),completed=new Array(P).fill(0);
  const tinfo={};
  rounds.forEach((rd,r)=>{
    rd.tables.forEach((tbl,t)=>{
      const res=tableResult(r,t,tbl);              // この卓のスコア計算
      tinfo[`${r}_${t}`]={res,tbl};
      tbl.forEach((p,i)=>{
        scheduled[p]++;                            // 座っただけで予定数+1
        if(res.allEntered){total[p]+=res.sc[i];completed[p]++;}  // 確定卓のみ合計と消化数に加算
      });
    });
  });
  return {total,scheduled,completed,tinfo};
}

// 点数入力のたびに呼ばれ、各卓の合計・各席のpt表示・順位表をまとめて更新する。
// renderと違いHTMLを作り直さず、既にある要素のテキストだけ書き換えるので軽い。
function updateTotals(){
  const {P,names}=current;
  const {total,scheduled,completed,tinfo}=computeAll();
  // --- (A) 卓ごとの「合計」と、各席の「pt（着順＋スコア）」を更新 ---
  for(const k in tinfo){                            // k は "戦_卓"
    const {res,tbl}=tinfo[k];
    const sumEl=$("sum_"+k);                         // 卓ヘッダの合計表示欄
    if(sumEl){
      if(res.allEntered){
        const ok=Math.abs(res.sum-res.target)<0.5;  // 点棒合計が正しい(初期点×4)か
        sumEl.textContent="合計 "+res.sum.toLocaleString()+(ok?"":" ⚠");  // ずれていたら⚠
        sumEl.classList.toggle("bad",!ok);          // ずれていれば赤く（badクラス付与）
      }else{
        sumEl.textContent=res.filled?`記入 ${res.filled}/4`:"";  // 未完成は「記入x/4」
        sumEl.classList.remove("bad");
      }
    }
    // 4席ぶんの結果表示。pt_戦_卓_席 の要素に「○着 +12.3」のように出す。
    for(let i=0;i<4;i++){
      const ptEl=$("pt_"+k.split("_")[0]+"_"+k.split("_")[1]+"_"+i);  // kを分解してキーを再構成
      if(!ptEl)continue;
      if(res.allEntered){
        const v=res.sc[i];
        ptEl.innerHTML=`<span class="rk">${RANKLBL[res.rank[i]]}</span>${fmtSigned(v)}`;  // 着順ラベル＋符号付き
        ptEl.classList.toggle("plus",v>0);ptEl.classList.toggle("minus",v<0);  // プラス緑/マイナス赤
      }else{ptEl.textContent="";ptEl.classList.remove("plus","minus");}        // 未完成は空表示
    }
  }
  // --- (B) 順位表を作る ---
  const rows=[];
  for(let p=0;p<P;p++) rows.push({p,name:names[p],total:total[p],scheduled:scheduled[p],completed:completed[p]});
  rows.sort((a,b)=>b.total-a.total);               // 合計スコアの高い順に並べ替え
  const anyScore=rows.some(r=>r.completed>0);       // 1卓でもスコア確定があるか（無ければ「–」表示）
  $("standBrief").textContent=anyScore?`首位 ${rows[0].name} ${fmtSigned(rows[0].total)}`:"点数未入力";
  let html=`<table class="stb">
    <tr><th>順位</th><th>プレイヤー</th><th style="text-align:right">合計スコア</th><th style="text-align:right">消化</th></tr>`;
  // 同点は同順位にする。前の人とスコアが違ったときだけ順位を更新（1e-9は浮動小数の誤差吸収）。
  let rank=0,prev=null;
  rows.forEach((r,idx)=>{
    if(prev===null||Math.abs(r.total-prev)>1e-9){rank=idx+1;prev=r.total;}
    const cls=r.total>0.0001?"plus":r.total<-0.0001?"minus":"";  // 正は緑/負は赤/0は無色
    html+=`<tr><td class="pos">${anyScore?rank:'–'}</td><td>${esc(r.name)}</td>`+
          `<td class="num ${cls}">${anyScore?fmtSigned(r.total):'–'}</td>`+
          `<td class="num" style="color:var(--muted)">${r.completed}/${r.scheduled}</td></tr>`;  // 消化/予定
  });
  html+=`</table><div class="hint" style="margin-top:8px">※ 4人全員の点棒が入った卓のみスコア計算。素点は五捨六入で千点単位(pt)に丸め、端数（±1pt）は1着で調整して卓合計を0にしています。</div>`;
  $("standings").innerHTML=html;
}
// 数値を符号付き文字列に。小数第1位まで丸め、整数なら小数点なし、正なら頭に+を付ける（例 +12 / -3.5）。
function fmtSigned(n){const r=Math.round(n*10)/10;return (r>0?"+":"")+(Number.isInteger(r)?r:r.toFixed(1));}
// 五捨六入：素点(点)を千点単位(pt)に丸める。500以下は切り捨て・600以上は切り上げ。
//   s=符号, a=絶対値, th=千の位(切り捨て), rem=端数。rem>=600なら1繰り上げ。最後に符号を戻す。
function gosha(n){const s=n<0?-1:1,a=Math.abs(n),th=Math.floor(a/1000),rem=a-th*1000;return s*(th+(rem>=600?1:0));}

// 入力値を5桁に0埋めする。5桁未満の数字は末尾に0を足して5桁へ（例: 250→25000, 253→25300, 89→89000）。
// 符号(-)は保持。空や5桁以上はそのまま。麻雀点は「下2桁00・5桁が基本」という前提のための補助。
function padScore(s){
  s=String(s).trim();
  if(s==="") return "";
  const neg=s[0]==="-";
  let d=s.replace(/[^\d]/g,"");          // 数字部分だけ取り出す
  if(d==="") return "";
  if(d.length<5) d=d.padEnd(5,"0");      // 5桁未満なら末尾に0を補って5桁に
  return (neg?"-":"")+d;
}
// 入力欄の値を保存する共通処理。空・不正なら削除、数値ならフル桁の文字列で保存。
function storeSeatScore(inp){
  const key=inp.dataset.key;
  if(inp.value===""||isNaN(parseFloat(inp.value))) delete scores[key]; else scores[key]=inp.value;
}

// ===== 点棒入力の処理 =====
// 「イベント委譲」：個々の入力欄ではなく親の#roundsに1つだけリスナーを付ける。
// 入力欄は再描画で作り直されるが、親は不変なのでリスナーを貼り直す必要がない（効率的）。
// e.target.closest(".score-input") で、実際に入力されたのが点棒欄か判定する。
// input：1文字ごとに発火。入力途中の値をそのまま保存して合計/順位を即時更新（0埋めはまだしない）。
$("rounds").addEventListener("input",e=>{
  const inp=e.target.closest(".score-input");if(!inp)return;  // 点棒欄以外の入力は無視
  storeSeatScore(inp);
  saveScores(true);updateTotals();                 // 保存＆合計/順位を即時更新
});
// change：入力確定（フォーカスを外す/Enter）で発火。5桁未満なら末尾0埋めして5桁にし、保存し直す。
$("rounds").addEventListener("change",e=>{
  const inp=e.target.closest(".score-input");if(!inp)return;
  inp.value=padScore(inp.value);                   // 例: 320→32000
  storeSeatScore(inp);
  saveScores(false);updateTotals();
});
// ±ボタンで符号を反転（スマホの数字キーパッドにマイナスが無い環境向けの工夫）
$("rounds").addEventListener("click",e=>{
  const sb=e.target.closest(".signbtn");if(!sb)return;
  const inp=sb.parentElement.querySelector(".score-input");if(!inp)return;  // 同じ席の入力欄を取得
  const v=inp.value.trim();
  if(v===""||v==="-"){inp.focus();return;}          // 空や"-"だけなら反転せずフォーカスだけ
  inp.value=(v.charAt(0)==="-")?v.slice(1):"-"+v;   // 先頭が"-"なら外す、なければ付ける
  inp.value=padScore(inp.value);                   // ±押下も確定扱いで5桁に0埋め
  storeSeatScore(inp);
  saveScores(true);updateTotals();
});

// ===== 席の入れ替え（特定の戦の中で、2か所をタップして交換する機能） =====
// swapRound = 今入れ替えモードにしている戦番号（null=オフ）
// swapSel   = 1つ目に選んだ場所（席 or 抜け番）。2つ目を選ぶと交換が実行される。
let swapRound=null,swapSel=null;
// 選択中のハイライト(.selected)を全部外す
function clearSel(){document.querySelectorAll(".selected").forEach(el=>el.classList.remove("selected"));swapSel=null;}
// 2つの選択が「同じ場所」か判定（同じ所をもう一度押したら選択解除するため）
function sameSel(a,b){if(a.kind!==b.kind)return false;return a.kind==="seat"?(a.r===b.r&&a.t===b.t&&a.s===b.s):(a.r===b.r&&a.bi===b.bi);}
// 実際に2か所を入れ替える。3パターン：席⇔席 / 抜け番⇔抜け番 / 席⇔抜け番。
function performSwap(a,b){
  const r=a.r, rd=current.rounds[r];               // 同じ戦の中だけで入れ替える
  if(a.kind==="seat"&&b.kind==="seat"){
    // 席⇔席：プレイヤーを入れ替え、入力済みの点数も一緒に付いていくよう交換する
    const pa=rd.tables[a.t][a.s], pb=rd.tables[b.t][b.s];
    rd.tables[a.t][a.s]=pb; rd.tables[b.t][b.s]=pa;
    const ka=`${r}_${a.t}_${a.s}`, kb=`${r}_${b.t}_${b.s}`;
    const va=scores[ka], vb=scores[kb];
    if(vb!==undefined)scores[ka]=vb; else delete scores[ka];   // 片方が未入力なら点数を消す
    if(va!==undefined)scores[kb]=va; else delete scores[kb];
  }else if(a.kind==="bye"&&b.kind==="bye"){
    // 抜け番⇔抜け番：byes配列の中身を入れ替えるだけ（点数は無い）
    const tmp=rd.byes[a.bi]; rd.byes[a.bi]=rd.byes[b.bi]; rd.byes[b.bi]=tmp;
  }else{ // 席 ⇄ 抜け番
    const seat=a.kind==="seat"?a:b, bye=a.kind==="bye"?a:b;     // どちらが席/抜け番か振り分け
    const seatPlayer=rd.tables[seat.t][seat.s], byePlayer=rd.byes[bye.bi];
    rd.tables[seat.t][seat.s]=byePlayer; rd.byes[bye.bi]=seatPlayer;  // 座る人と待つ人を交換
    delete scores[`${r}_${seat.t}_${seat.s}`]; // 抜け番に出た席の点数は破棄（新たに座る人は未入力）
  }
  swapSel=null; saveLast(); saveScores(false); render(); uiToast("入れ替えました");
}
// 入れ替えモードのオン/オフ切り替え（同じ戦のボタンをもう一度押すとオフ）
function toggleSwap(r){swapRound=(swapRound===r?null:r);clearSel();render();}
// 対戦表内のクリックを1か所で受ける（ここも委譲）。入れ替えボタン／席／抜け番チップを判定。
$("rounds").addEventListener("click",e=>{
  const sb=e.target.closest(".round-swap");
  if(sb){toggleSwap(+sb.dataset.r);return;}         // 入れ替えボタンならモード切替（+で数値化）
  if(swapRound===null)return;                       // モードOFFなら以降は何もしない
  const seatEl=e.target.closest(".seat"), byeEl=e.target.closest(".bye-chip");
  // クリックされた場所を pick オブジェクトにまとめる（席か抜け番か）
  let pick=null, el=null;
  if(seatEl&&seatEl.dataset.r!==undefined){pick={kind:"seat",r:+seatEl.dataset.r,t:+seatEl.dataset.t,s:+seatEl.dataset.s};el=seatEl;}
  else if(byeEl&&byeEl.dataset.r!==undefined){pick={kind:"bye",r:+byeEl.dataset.r,bi:+byeEl.dataset.bi};el=byeEl;}
  else return;
  if(pick.r!==swapRound)return;                     // 入れ替えモード中の戦以外は無視
  if(!swapSel){swapSel=pick;el.classList.add("selected");return;}  // 1つ目の選択（ハイライト）
  if(sameSel(swapSel,pick)){clearSel();return;}     // 同じ所を押したら選択解除
  performSwap(swapSel,pick);                         // 2つ目を選んだら入れ替え実行
});

// ===== 対戦の追加・削除 =====
// 既存の対戦表の「続き」を1戦だけ追加する。
// buildSchedule（最初から全戦作る関数）とほぼ同じ手順だが、ここでは“今までの履歴”を
// 引き継いだ状態から始める点が違う。なのでまず deriveStats で過去の集計を取り出す。
function addRound(){
  const {P,T,Bpr,rounds}=current;
  if(T<1)return;                            // 4人未満では卓が作れない
  const agg=deriveStats(rounds,P);          // 既存の対戦履歴を集計（これを初期状態にする）
  const counts=agg.counts, wind=agg.wind, byeCount=agg.byeCount;
  const rng=mulberry((Date.now()^((Math.random()*1e9)|0))>>>0);  // 種は時刻＋乱数で毎回ちがう
  const pairIdx=(a,b)=> a<b?a*P+b:b*P+a;
  // --- 抜け番を選ぶ（buildScheduleと同じ考え方：抜け番回数が少ない人優先・直前の抜け番は回避） ---
  let byes=[];
  const prevBye=new Set(rounds.length?rounds[rounds.length-1].byes:[]);  // 直前の戦の抜け番
  if(Bpr>0){
    const scored=[];
    for(let p=0;p<P;p++) scored.push([p, byeCount[p]*1000+(prevBye.has(p)?300:0)+rng()*100]);
    scored.sort((x,y)=>x[1]-y[1]);
    byes=scored.slice(0,Bpr).map(x=>x[0]);
  }
  // --- 着席者をシャッフルして4人ずつ卓に分ける ---
  const byeSet=new Set(byes);
  const seated=[];for(let p=0;p<P;p++) if(!byeSet.has(p)) seated.push(p);
  for(let i=seated.length-1;i>0;i--){const j=(rng()*(i+1))|0;[seated[i],seated[j]]=[seated[j],seated[i]];}
  const tables=[];for(let t=0;t<T;t++) tables.push(seated.slice(t*4,t*4+4));
  // --- 既存の対戦回数(counts)に対して偏りが小さくなるよう焼きなましで席替え最適化 ---
  //     （詳しい仕組みは上の buildSchedule のコメント参照。countsが過去ぶん入っているのがポイント） ---
  function tableCostDelta(tbl,sign){let d=0;for(let i=0;i<4;i++)for(let j=i+1;j<4;j++){const c=counts[pairIdx(tbl[i],tbl[j])];d+=sign>0?(2*c+1):(-2*c+1);}return d;}
  function applyTable(tbl,sign){for(let i=0;i<4;i++)for(let j=i+1;j<4;j++) counts[pairIdx(tbl[i],tbl[j])]+=sign;}
  tables.forEach(t=>applyTable(t,1));
  let temp=2.0;const iters=Math.max(2500,T*T*500);
  for(let it=0;it<iters;it++){
    const tA=(rng()*T)|0,tB=(rng()*T)|0;if(tA===tB)continue;
    const iA=(rng()*4)|0,iB=(rng()*4)|0;const A=tables[tA],B=tables[tB];
    const b1=tableCostDelta(A,-1);applyTable(A,-1);const b2=tableCostDelta(B,-1);applyTable(B,-1);
    [A[iA],B[iB]]=[B[iB],A[iA]];
    const a1=tableCostDelta(A,1);applyTable(A,1);const a2=tableCostDelta(B,1);applyTable(B,1);
    if((a1+a2)-(b1+b2)>0 && rng()>Math.exp(-((a1+a2)-(b1+b2))/temp)){
      applyTable(A,-1);applyTable(B,-1);[A[iA],B[iB]]=[B[iB],A[iA]];applyTable(A,1);applyTable(B,1);
    }
    temp*=0.9995;if(temp<0.05)temp=0.05;
  }
  // --- 席（東南西北）も既存分(wind)とあわせて均等になるよう、24通りから最良を選んで割り当て ---
  for(const t of tables){
    let bp=null,bc=Infinity;
    for(const pm of PERMS){let c=0;for(let i=0;i<4;i++)c+=wind[t[i]*4+pm[i]];if(c<bc){bc=c;bp=pm;}}
    const no=new Array(4);for(let i=0;i<4;i++)no[bp[i]]=t[i];
    for(let i=0;i<4;i++){t[i]=no[i];wind[t[i]*4+i]++;}
  }
  current.rounds.push({tables,byes});       // 新しい戦を末尾に追加
  current.R=current.rounds.length;          // 戦数を更新
  swapRound=null;swapSel=null;              // 入れ替えモードは解除
  saveLast();render();uiToast("対戦を1つ追加しました");
}
// 第r戦を削除する。点数のキーは戦番号を含むので、削除後に番号を振り直す必要がある。
function deleteRound(r){
  if(current.rounds.length<=1){uiToast("これ以上は削除できません");return;}  // 最低1戦は残す
  uiConfirm(`第${r+1}戦を削除します。よろしいですか？`,()=>{           // 確認ダイアログでOKなら実行
    current.rounds.splice(r,1);              // 配列からr番目を取り除く
    // 点数キー"戦_卓_席"を作り直す。削除戦は捨て、後ろの戦は番号を1つ繰り上げる。
    const ns={};
    Object.keys(scores).forEach(k=>{
      const a=k.split("_").map(Number),rr=a[0];   // a=[戦,卓,席]
      if(rr===r) return;                     // 削除した戦の点数は破棄
      const nr=rr>r?rr-1:rr;                  // 後ろの戦は番号を繰り上げ
      ns[`${nr}_${a[1]}_${a[2]}`]=scores[k];
    });
    scores=ns;
    current.R=current.rounds.length;
    swapRound=null;swapSel=null;
    saveLast();saveScores(false);render();uiToast(`第${r+1}戦を削除しました`);
  });
}
$("addRound").onclick=addRound;             // 「＋対戦を追加」ボタン
// ×（戦の削除）ボタン。stopPropagationで、上の入れ替え用クリック処理に伝わらないよう止める。
$("rounds").addEventListener("click",e=>{
  const del=e.target.closest(".del-round");if(!del)return;
  e.stopPropagation();deleteRound(+del.dataset.r);
});

// ===== 大会ライブラリ（ブラウザ内に複数の大会を保存・参照・削除） =====
// localStorage の LIB_KEY に「保存した大会の配列」を入れる。1件 = 名前＋対戦表＋設定＋点数のスナップショット。
// 自動保存(LAST_KEY)が「最後に開いた1件」なのに対し、こちらは名前を付けて好きなだけ残せる保管庫。
const LIB_KEY="mahjong_library_v1";
// 保管庫を読み込む。壊れていたら空配列にフォールバック（JSON.parseは失敗すると例外を投げる）。
function loadLibrary(){try{const a=JSON.parse(localStorage.getItem(LIB_KEY)||"[]");return Array.isArray(a)?a:[];}catch(e){return [];}}
// 保管庫を書き戻す。容量超過(QuotaExceeded)などで失敗したら通知して false を返す。
function saveLibrary(lib){try{localStorage.setItem(LIB_KEY,JSON.stringify(lib));return true;}catch(e){uiToast("保存できませんでした（ブラウザの保存容量が一杯の可能性）");return false;}}

// 今表示中の大会を、入力された名前でライブラリへ保存する。点数・設定も丸ごと含める。
function saveCurrentToLibrary(name){
  if(!current){uiToast("先に対戦表を作成してください");return;}
  name=(name||"").trim();
  if(!name){uiToast("保存名を入力してください");$("libName").focus();return;}
  const lib=loadLibrary();
  // 保存する1件分のデータ。keyは一意なID（時刻＋乱数）。scores/settingsは今の値をコピーして固定。
  const makeEntry=key=>({key,name,savedAt:new Date().toISOString(),
    P:current.P,G:current.G,names:current.names.slice(),rounds:current.rounds,
    settings:{kichi:settings.kichi,oka:settings.oka,uma:settings.uma},scores:Object.assign({},scores)});
  // 同じ名前が既にあれば上書き確認。違う名前なら新規追加。
  const idx=lib.findIndex(e=>e.name===name);
  if(idx>=0){
    uiConfirm(`「${name}」はすでに保存されています。上書きしますか？`,()=>{
      lib[idx]=makeEntry(lib[idx].key);                       // keyは引き継いで中身だけ更新
      if(saveLibrary(lib)){renderLibList();uiToast("上書き保存しました");}
    });
    return;
  }
  lib.push(makeEntry(Date.now()+"_"+((Math.random()*1e6)|0)));
  if(saveLibrary(lib)){$("libName").value="";renderLibList();uiToast("保存しました");}
}
// ライブラリの1件を読み込んで画面に復元する。点数があれば確認してから上書き。
function loadFromLibrary(key){
  const e=loadLibrary().find(x=>x.key===key);if(!e)return;
  const apply=()=>{
    // loadState は保存データ d と点数 sc から current を組み立てる共通処理（ファイル復元と同じ入口）。
    loadState({id:e.key,P:e.P,G:e.G,names:e.names,rounds:e.rounds,settings:e.settings}, e.scores||{});
    closeLib();uiToast(`「${e.name}」を読み込みました`);
  };
  if(hasScores()) uiConfirm("現在入力中の点数は失われます。読み込みますか？",apply); else apply();
}
// ライブラリの1件を削除する（確認あり）。filterでkeyが一致しないものだけ残す。
function deleteFromLibrary(key){
  const e=loadLibrary().find(x=>x.key===key);if(!e)return;
  uiConfirm(`「${e.name}」を削除します。よろしいですか？`,()=>{
    if(saveLibrary(loadLibrary().filter(x=>x.key!==key))){renderLibList();uiToast("削除しました");}
  });
}
// ライブラリ一覧のHTMLを組み立てて #libList に描画する。新しい保存が上に来るよう日時で降順ソート。
function renderLibList(){
  const lib=loadLibrary().sort((a,b)=>String(b.savedAt||"").localeCompare(String(a.savedAt||"")));
  const box=$("libList");
  if(!lib.length){box.innerHTML='<div class="lib-empty">まだ保存された大会はありません。<br>上の欄に名前を入れて「現在の大会を保存」を押すと、ここに一覧表示され、いつでも読み込めます。</div>';return;}
  box.innerHTML=lib.map(e=>{
    const d=new Date(e.savedAt);                              // 保存日時を「2026/6/28 14:05」の形に整形
    const dt=isNaN(d.getTime())?"":`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    const R=e.rounds?e.rounds.length:0;                       // 戦数
    const hasSc=e.scores&&Object.keys(e.scores).length>0;     // 点数が入っているか
    // data-key に一意IDを埋め込み、クリック時にどの大会かを特定する（委譲で1か所受け）。
    return `<div class="lib-item"><div class="lib-meta">`+
      `<div class="lib-name">${esc(e.name)}</div>`+
      `<div class="lib-sub">${e.P}人・${R}戦${hasSc?'・点数あり':''}　${dt}</div></div>`+
      `<div class="lib-btns"><button class="btn-main lib-load" data-key="${esc(e.key)}">読み込み</button>`+
      `<button class="btn-sub lib-del" data-key="${esc(e.key)}">削除</button></div></div>`;
  }).join("");
}
// ライブラリモーダルを開く（名前欄を空にして最新の一覧を表示）／閉じる
function openLib(){$("libName").value="";renderLibList();$("libModal").style.display="flex";}
function closeLib(){$("libModal").style.display="none";}

// ===== CSV出力（Excelで開ける表形式） =====
// CSVは「カンマ区切りのテキスト」。1行=1レコード、セルをカンマで区切る。
// ここでは rows という2次元配列（行の配列）を組み立て、最後にCSV文字列へ変換する。
function toCSV(){
  const {names,rounds}=current;
  const {total,scheduled,completed,tinfo}=computeAll();
  // まず設定と、対戦表の見出し行を入れる（空配列[]は空行）
  let rows=[
    ["■ 設定"],["初期点",settings.kichi,"オカ",settings.oka,"ウマ",settings.uma,"返し点",settings.kichi+settings.oka/4],
    [],["■ 対戦表"],["試合","卓","席","プレイヤー","点棒","着順","スコア"]];
  // 全戦・全卓・全席を1行ずつ追加
  rounds.forEach((rd,r)=>{
    rd.tables.forEach((tbl,t)=>{
      const res=tinfo[`${r}_${t}`].res;
      tbl.forEach((p,i)=>{
        const v=scores[`${r}_${t}_${i}`];
        rows.push([`第${r+1}戦`,`卓${t+1}`,WINDS[i],names[p],(v==null?"":v),
          res.allEntered?(res.rank[i]+1)+"着":"", res.allEntered?fmtSigned(res.sc[i]):""]);
      });
    });
    if(rd.byes.length) rows.push([`第${r+1}戦`,"抜け番","","",rd.byes.map(p=>names[p]).join(" / "),"",""]);  // 抜け番行
  });
  rows.push([]);
  // 順位表も付ける（合計スコアの高い順、同点は同順位）
  rows.push(["■ 順位表"],["順位","プレイヤー","消化試合","合計スコア"]);
  const order=names.map((nm,p)=>({nm,total:total[p],completed:completed[p],scheduled:scheduled[p]})).sort((a,b)=>b.total-a.total);
  let rank=0,prev=null;
  order.forEach((o,idx)=>{if(prev===null||Math.abs(o.total-prev)>1e-9){rank=idx+1;prev=o.total;}
    rows.push([rank,o.nm,`${o.completed}/${o.scheduled}`,fmtSigned(o.total)]);});
  // rows(2次元配列)をCSV文字列に変換。値に , " 改行 を含むセルは "" で囲み、中の " は "" に増やす（CSVの規則）。
  const csv=rows.map(r=>r.map(c=>{c=(c==null?"":String(c));return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(",")).join("\r\n");
  // 先頭の "﻿"(BOM)は、ExcelでUTF-8の日本語が文字化けしないためのおまじない。
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=`麻雀対戦表_${current.P}人_${current.R}R.csv`;a.click();URL.revokeObjectURL(url);
}

// ===== UIヘルパー（自前の確認ダイアログ・通知・補助関数） =====
// confirm/alert は簡易webview(LINEやアプリ内ブラウザ等)で動かないことがあるため、自前のダイアログを使う。
// onYes は「はい」を押したときに実行する処理（コールバック関数）。
function uiConfirm(msg,onYes){const bg=$("modal");$("modalMsg").textContent=msg;bg.style.display="flex";
  const y=$("modalYes"),n=$("modalNo");const close=()=>{bg.style.display="none";y.onclick=null;n.onclick=null;};  // 閉じる時にハンドラも掃除
  y.onclick=()=>{close();onYes();};n.onclick=close;}
// 画面上部に一瞬出る通知（トースト）。2秒後に自動で消す。連続呼び出しはタイマーを張り直す。
function uiToast(msg){const t=$("toast");t.textContent=msg;t.classList.add("show");clearTimeout(uiToast._t);uiToast._t=setTimeout(()=>t.classList.remove("show"),2000);}
function short(s){return s.length>4?s.slice(0,4):s;}  // マトリクス見出し用に名前を4文字へ短縮
// HTMLエスケープ。文字列中の & < > " を実体参照に変換し、表示崩れやXSS（不正なHTML/スクリプト挿入）を防ぐ。
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

// ===== 起動処理（ページ読み込み時に一度だけ実行される） =====
applySettingsToInputs();                    // 設定欄に初期値を表示
if(!restore()) generate(12345);             // 前回データがあれば復元、無ければ固定の種で初期表示を作る
</script>
